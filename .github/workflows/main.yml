name: 🎮 Build Sonic Dash Plus

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: 🔖 Generate Build Tag
    runs-on: ubuntu-latest
    outputs:
      build_tag: ${{ steps.tag.outputs.build_tag }}
      build_number: ${{ steps.tag.outputs.build_number }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔢 Calculate next build number & push tag
        id: tag
        run: |
          git fetch --tags --quiet

          LAST=$(git tag -l 'build-*' \
                   | grep -E '^build-[0-9]+$' \
                   | sed 's/build-//' \
                   | sort -n \
                   | tail -1)

          LAST=${LAST:-0}
          NEXT=$((LAST + 1))
          TAG="build-${NEXT}"

          echo "build_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "build_number=${NEXT}" >> "$GITHUB_OUTPUT"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" -m "Automated build #${NEXT}"
          git push origin "$TAG"

  build:
    name: 🔨 ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: version
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Android
            name: Android-Release
            outputName: SonicDashPlus-Android-Release

          - platform: StandaloneWindows64
            name: Windows-Release
            outputName: SonicDashPlus-Windows-Release

          - platform: StandaloneLinux64
            name: Linux-Release
            outputName: SonicDashPlus-Linux-Release

          - platform: WebGL
            name: WebGL-Release
            outputName: SonicDashPlus-WebGL-Release

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: 📦 Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.platform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.platform }}-
            Library-

      - name: 🏗️ Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2018.4.3f1
          targetPlatform: ${{ matrix.platform }}
          buildName: ${{ matrix.outputName }}
          buildsPath: build

      - name: 🔎 Detect build output
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "Android" ]; then
            APK_FILE=$(find build -type f -name "*.apk" | head -1)
            if [ -z "$APK_FILE" ]; then
              echo "Missing Android APK"
              find build -maxdepth 4 -type f | sort || true
              exit 1
            fi
            echo "APK_FILE=$APK_FILE" >> "$GITHUB_ENV"
          else
            BUILD_DIR=$(find build -mindepth 1 -maxdepth 1 -type d | head -1)
            if [ -z "$BUILD_DIR" ]; then
              echo "Missing build folder"
              find build -maxdepth 4 -type d | sort || true
              exit 1
            fi
            echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"
          fi

      - name: 🗜️ Zip build output
        if: matrix.platform != 'WebGL'
        shell: bash
        run: |
          ZIP_NAME="${{ matrix.outputName }}.zip"

          if [ "${{ matrix.platform }}" = "Android" ]; then
            zip -j -9 "$ZIP_NAME" "$APK_FILE"
          else
            (cd build && zip -r -9 "../$ZIP_NAME" "$(basename "$BUILD_DIR")")
          fi

      - name: 📤 Upload zipped artifact
        if: matrix.platform != 'WebGL'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.outputName }}.zip
          retention-days: 1
          if-no-files-found: error

      - name: 📤 Upload WebGL folder
        if: matrix.platform == 'WebGL'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.BUILD_DIR }}
          retention-days: 1
          if-no-files-found: error

  release:
    name: 🚀 Publish Pre-Release
    runs-on: ubuntu-latest
    needs: [version, build]
    if: always()

    steps:
      - name: 📥 Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: 📋 List release assets
        run: |
          echo "=== Assets to be released ==="
          find release-assets -type f | sort || echo "(none found)"

      - name: 🏷️ Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          tag_name: ${{ needs.version.outputs.build_tag }}
          name: "Sonic Dash Plus — Build #${{ needs.version.outputs.build_number }} (Pre-Release)"
          files: release-assets/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
