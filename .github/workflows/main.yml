build:
  name: 🔨 ${{ matrix.name }}
  runs-on: ubuntu-latest
  needs: [version, activation]

  strategy:
    fail-fast: false
    matrix:
      include:
        # ───── Android (Release + Debug) ─────
        - platform: Android
          name: Android-Release
          development: false

        - platform: Android
          name: Android-Debug
          development: true

        # ───── Other platforms (Release ONLY) ─────
        - platform: StandaloneWindows64
          name: Windows
          development: false

        - platform: StandaloneLinux64
          name: Linux
          development: false

        - platform: WebGL
          name: WebGL
          development: false

  steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: 📦 Cache Library
      uses: actions/cache@v4
      with:
        path: Library
        key: Library-${{ matrix.platform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
        restore-keys: |
          Library-${{ matrix.platform }}-
          Library-

    - name: 🏗️ Build
      uses: game-ci/unity-builder@v4
      env:
        UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
        UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      with:
        unityVersion: 2018.4.3f1
        targetPlatform: ${{ matrix.platform }}
        buildName: SonicDashPlus-${{ matrix.name }}
        buildsPath: build
        developmentBuild: ${{ matrix.development }}

    - name: 🗜️ Zip build
      run: |
        BUILD_DIR="build/${{ matrix.platform }}"
        ZIP="SonicDashPlus-${{ matrix.name }}.zip"

        if [ -d "$BUILD_DIR" ]; then
          cd build
          zip -r "../$ZIP" "${{ matrix.platform }}"
        else
          echo "No build output found"
          exit 1
        fi

    - name: 📤 Upload
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: SonicDashPlus-${{ matrix.name }}.zip
